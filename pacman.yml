name: Generate Pacman Contribution Graph

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # This is the action that generates the pacman graph
      # It creates the SVGs based on your github contributions
      - name: Generate Pacman Graph
        uses: maurodesouza/profile-readme-stats@master
        with:
          username: ${{ github.repository_owner }}
          # You can customize colors/themes here if the action supports it

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist # Or wherever the action saves the svgs, usually defined by the action documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
